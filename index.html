<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | ThermoAir</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #203764;
            font-family: Calibri, "Segoe UI", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2937;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .35);
            text-align: center;
        }

        .logo {
            height: 48px;
            width: auto;
            margin-bottom: 15px;
        }

        h2 {
            color: #203764;
            font-size: 26px;
            font-weight: normal;
            margin-bottom: 25px;
            font-style: italic;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: #284B87;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #d2d9e6;
            border-radius: 10px;
            outline: none;
            transition: .20s;
            color: #203764;
        }

        input:focus {
            border-color: #203764;
            box-shadow: 0 0 0 4px rgba(32, 55, 100, .15);
        }

        .btn-ingresar {
            width: 100%;
            background: #284B87;
            color: white;
            border: none;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s;
            margin-top: 10px;
        }

        .btn-ingresar:hover {
            background: #203764;
        }

        #mensajeError {
            color: #dc2626;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }

        /* 📱 Adaptación moderna para celulares con tarjeta flotante */
        @media (max-width: 768px) {
            body {
                /* Mantenemos el fondo azul y el centrado perfecto */
                background: #203764;
                align-items: center; 
                padding: 20px; /* Evita que la tarjeta toque el borde superior/inferior en pantallas muy bajas */
            }

            .login-card {
                /* Usamos el 90% del ancho disponible para dejar márgenes elegantes a los lados */
                width: 90%; 
                /* Mantenemos las esquinas curvas y la sombra para dar volumen */
                border-radius: 16px;
                box-shadow: 0 15px 35px rgba(0, 0, 0, .4);
                padding: 35px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="Logo/imagotipo_ThermoAir_Azul.svg" alt="ThermoAir" class="logo">
        <h2>Control de Acceso</h2>

        <form id="formLogin">
            <div class="form-group">
                <label for="txtUsuario">Usuario</label>
                <input type="text" id="txtUsuario" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="txtContrasena">Contrasena</label>
                <input type="password" id="txtContrasena" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>

        <div id="mensajeError">Usuario o contrasena incorrectos</div>
    </div>

    <script src="login.js"></script>
</body>

</html>
