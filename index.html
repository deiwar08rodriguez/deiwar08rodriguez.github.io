<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThermoAir S.A.S</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#203764;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Calibri, Arial, sans-serif;

}

.contenedor{

    text-align:center;

}

.logo-principal{

    width:460px;

    max-width:90vw;

    margin-bottom:70px;

}

h1{

    color:white;

    font-size:54px;

    font-style:italic;

    margin-bottom:60px;

    font-weight:normal;

}

.menu{

    display:flex;

    justify-content:center;

    gap:25px;

}

.boton{

    display:inline-block;

    width:220px;

    padding:18px;

    background:white;

    color:#203764;

    text-decoration:none;

    font-size:22px;

    font-weight:bold;

    border-radius:10px;

    transition:.25s;

}

.boton:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 20px rgba(0,0,0,.25);

}

</style>

</head>

<body>

<div class="contenedor">

<img
src="Logo/imagotipo_blanco.svg"
alt="ThermoAir"
class="logo-principal"
>

<div class="menu">

<a href="productos.html" class="boton">
PRODUCTOS
</a>

<a href="buses.html" class="boton">
BUSES
</a>

</div>

</div>

</body>

</html>
