<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario | ThermoAir</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#203764;
    font-family:Calibri, "Segoe UI", Arial, sans-serif;
    color:#1f2937;

}

header{

    height:80px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 35px;

    color:white;

}

.logo-area{

    display:flex;
    align-items:center;

}

.logo{

    height:42px;

    width:auto;

}

.separador{

    width:2px;

    height:38px;

    background:rgba(255,255,255,.35);

    margin-left:18px;
    margin-right:18px;

}

.modulo{

    color:white;

    font-size:30px;

    font-style:italic;

    font-weight:normal;

}

header h1{

    font-size:34px;
    font-style:italic;
    font-weight:normal;

}

header a{

    color:white;
    text-decoration:none;
    font-size:18px;

}

header a:hover{

    text-decoration:underline;

}

main{

    margin:0 25px 25px 25px;

    background:white;

    border-radius:16px;

    padding:30px;

    box-shadow:0 18px 45px rgba(0,0,0,.25);

}

h2{

    color:#203764;

    margin-bottom:24px;

    font-size:34px;

    font-weight:normal;

}

#txtBuscar{

    width:100%;

    padding:16px 22px;

    font-size:17px;

    border:2px solid #d2d9e6;

    border-radius:10px;

    margin-bottom:25px;

    outline:none;

    transition:.20s;

}

#txtBuscar:focus{

    border-color:#203764;

    box-shadow:0 0 0 4px rgba(32,55,100,.15);

}

.table-container{

    border-radius:10px;

    overflow:auto;

    border:1px solid #d7dde8;

    max-height:75vh;

}

table{

    width:100%;

    border-collapse:collapse;

    font-size:14px;

}

thead th{

    background:#284B87;

    color:white;

    padding:14px;

    position:sticky;

    top:0;

    text-align:left;

    white-space:nowrap;

    z-index:20;

    font-size:14px;

    letter-spacing:.5px;

}

tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid #e6ebf2;
    color: #203764;
}

tbody tr:nth-child(even) {
    background: #fafbfc;
}

tbody tr:hover {
    background: #dfe9ff;
    transition: .15s;
}

/* Clases de consistencia de color con la vista celular */
.col-codigo {
    font-weight: bold;
    color: #284B87;
}

.col-subtexto {
    color: #3b82f6;
    font-weight: normal;
    text-transform: uppercase;
}

.col-descripcion {
    font-weight: bold;
    color: #1e3a8a;
}

.stock {
    text-align: center;
    font-weight: bold;
    color: #284B87;
}

/* Alerta roja para cuando el stock este en cero en la tabla de PC */
.stock.sin-stock {
    color: #dc2626;
}

.precio {
    text-align: right;
    font-family: Consolas, monospace;
    font-weight: bold;
    color: #203764;
}


/* El contenedor móvil se mantiene oculto en PC */
.mobile-cards-container {
    display: none;
}

/* 📱 =======================================================
   ⚡ REGLAS DE ADAPTACIÓN PARA CELULAR (MENOS DE 768px)
   ======================================================= */
@media (max-width: 768px) {
    body {
        background: white; /* Quitamos el fondo azul general en móviles */
    }

    header {
        background: #203764; /* La barra superior mantiene el color de la marca */
        height: 65px;
        padding: 0 15px;
    }

    .logo { height: 32px; }
    .separador { height: 26px; margin-left: 10px; margin-right: 10px; }
    .modulo { font-size: 20px; }
    header a { font-size: 14px; }

    /* CERO desperdicio lateral: Main ocupa todo el ancho táctil */
    main {
        margin: 0;
        padding: 15px;
        border-radius: 0;
        box-shadow: none;
        background: white;
    }

    h2 {
        font-size: 24px;
        margin-bottom: 15px;
    }

    #txtBuscar {
        padding: 14px 18px;
        font-size: 16px;
        margin-bottom: 15px;
    }

    /* Ocultamos por completo la tabla de Excel para evitar desbordes */
    .table-container {
        display: none;
    }

    /* Activamos el contenedor de tarjetas verticales */
    .mobile-cards-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* Estilo para las tarjetas de consulta rápida */
    .prod-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* Texto principal en azul oscuro profundo */
    .card-descripcion {
        font-size: 16px;
        font-weight: bold;
        color: #1e3a8a;
        line-height: 1.3;
        padding-right: 90px; /* Evita que choque con el indicador de codigo puro */
        margin-bottom: 4px;
    }

    /* Indicador de codigo en cuadrito con contorno donde antes estaba stock en azul corporativo */
    .card-codigo-badge {
        position: absolute;
        top: 14px;
        right: 14px;
        background: #e2e8f0;
        color: #284B87;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: bold;
        border: 1px solid #cbd5e1;
    }

    /* Linea de categorias en azul medio suavizado */
    .card-subtexto {
        font-size: 12px;
        color: #3b82f6;
        margin-bottom: 8px;
        text-transform: uppercase;
    }


    /* El precio en azul oscuro para lectura en carrera */
    .card-precio-venta {
        font-size: 22px;
        font-weight: 800;
        color: #203764;
    }

    /* Panel expandible con los datos tecnicos de la oficina en azul oscuro sin grises */
    .card-detalles-ocultos {
        display: none;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed #cbd5e1;
        font-size: 13px;
        color: #203764;
        line-height: 1.6;
    }

    /* Clase que aplica el JS para abrir la información */
    .prod-card.abierta .card-detalles-ocultos {
        display: block;
    }

    /* Contenedor inferior para alinear el boton y el stock */
    .card-footer-movil {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
    }

    /* Stock abajo a la derecha en azul claro igual que el boton mas datos */
    .card-stock-text {
        font-size: 13px;
        font-weight: bold;
        color: #284B87;
    }

    /* Alerta en rojo estricto cuando no hay existencias */
    .card-stock-text.sin-stock {
        color: #dc2626;
    }


    /* Boton con estilo de flecha compacta sin subrayado */
    .btn-ver-mas {
        font-size: 13px;
        color: #284B87;
        font-weight: bold;
        cursor: pointer;
        background: none;
        border: none;
        display: flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
    }
}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img
src="Logo/Imagotipo_ThermoAir.svg"
alt="ThermoAir"
class="logo"
>

<div class="separador"></div>

<div class="modulo">
Gestión
</div>

</div>

<a href="index_gestion.html">
← Menú principal
</a>

</header>

<main>

<h2>Productos</h2>

<input
type="text"
id="txtBuscar"
placeholder="Buscar por código, categoría, subcategoría, descripción, proveedor o código proveedor..."
>

<!-- 🖥️ VISTA PC: Conserva tu tabla exacta con columnas adicionales -->
<div class="table-container">

<table>

<thead>

<tr>

<th>CÓDIGO</th>
<th>CATEGORÍA</th>
<th>SUBCATEGORÍA</th>
<th>DESCRIPCIÓN</th>
<th>STOCK</th>
<th>PROVEEDOR</th>
<th>PRECIO COMPRA</th>
<th>PRECIO VENTA</th>
<th>MARGEN</th>
<th>CODIGO PROV</th>

</tr>

</thead>

<tbody id="tablaProductos">
</tbody>

</table>

</div>

<!-- 📱 VISTA MÓVIL: Se activa sola en celulares cubriendo todo el ancho sin bordes azules -->
<div class="mobile-cards-container" id="contenedorTarjetasMovil"></div>

</main>

<script src="productos.js"></script>

</body>

</html>
