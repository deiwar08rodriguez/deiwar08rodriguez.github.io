<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Buses | ThermoAir</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- 🖥️ DISEÑO BASE PARA COMPUTADORA --- */
        body {
            background: #203764;
            font-family: Calibri, "Segoe UI", Arial, sans-serif;
            color: #1f2937;
        }

        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            color: white;
        }

        .logo-area { display: flex; align-items: center; }
        .logo { height: 42px; width: auto; }
        .separador { width: 2px; height: 38px; background: rgba(255, 255, 255, .35); margin-left: 18px; margin-right: 18px; }
        .modulo { color: white; font-size: 30px; font-style: italic; font-weight: normal; }
        header a { color: white; text-decoration: none; font-size: 18px; }
        header a:hover { text-decoration: underline; }

        main {
            margin: 0 25px 25px 25px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
        }

        h2 { color: #203764; margin-bottom: 24px; font-size: 34px; font-weight: normal; }

        #txtBuscar {
            width: 100%;
            padding: 16px 22px;
            font-size: 17px;
            border: 2px solid #d2d9e6;
            border-radius: 10px;
            margin-bottom: 25px;
            outline: none;
            transition: .20s;
        }

        #txtBuscar:focus {
            border-color: #203764;
            box-shadow: 0 0 0 4px rgba(32, 55, 100, .15);
        }

        .lista-buses {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bus-item {
            border: 1px solid #d7dde8;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: box-shadow 0.2s;
        }

        .bus-item:hover {
            box-shadow: 0 6px 15px rgba(32, 55, 100, 0.1);
        }

        .bus-header {
            display: flex;
            align-items: stretch;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .bus-header:hover {
            background: #dfe9ff;
            transition: background 0.15s;
        }

        /* 🚀 CONFIGURACIÓN VERTICAL OPTIMIZADA (3:4) */
        .bus-foto-wrapper {
            width: 100px; 
            aspect-ratio: 3 / 4; 
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            border-right: 1px solid #d7dde8;
            overflow: hidden;
            cursor: zoom-in; 
            transition: width 0.3s ease, aspect-ratio 0.3s ease;
        }

        .bus-foto { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            object-position: center;
        }

        /* 🚀 CUANDO EL DETALLE CRECE, EL ESPACIO VERTICAL SE AMPLÍA EN ARMONÍA */
        .bus-item.abierto .bus-foto-wrapper {
            width: 140px; 
            aspect-ratio: 3 / 4;
        }

        .bus-foto-placeholder { color: #284B87; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        .bus-info-main { 
            flex-grow: 1; 
            padding: 15px 45px 15px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bus-titulo { font-size: 19px; color: #1e3a8a; font-weight: bold; margin-bottom: 2px; }
        .bus-detalles-linea1 { font-size: 13px; color: #3b82f6; margin-bottom: 4px; text-transform: uppercase; }
        .bus-detalles-linea2 { font-size: 13px; font-weight: bold; color: #203764; }

        .bus-flecha { 
            font-size: 16px; 
            color: #284B87; 
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            transition: transform 0.2s; 
        }
        .bus-item.abierto .bus-flecha { transform: translateY(-50%) rotate(180deg); }


        .bus-detalle-panel {
            display: none;
            padding: 20px;
            background: #fafbfc;
            border-top: 1px solid #e6ebf2;
        }

        .bus-item.abierto .bus-detalle-panel { display: block; }

        /* Estilos de Tabla en PC con Hora y Recibe */
        .table-container {
            border-radius: 8px;
            overflow: auto;
            border: 1px solid #d7dde8;
            max-height: 40vh;
            background: white;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th { background: #284B87; color: white; padding: 12px; position: sticky; top: 0; text-align: left; z-index: 10; font-size: 13px; letter-spacing: .5px;}
        tbody td { padding: 10px 12px; border-bottom: 1px solid #e6ebf2; color: #203764; }
        tbody tr:nth-child(even) { background: #fafbfc; }
        tbody tr:hover { background: #dfe9ff; transition: .15s; }

        .col-codigo { font-weight: bold; color: #284B87; }
        .col-descripcion { font-weight: bold; color: #1e3a8a; }
        .col-recibe { color: #3b82f6; font-weight: bold; }
        .cantidad { text-align: center; font-weight: bold; color: #284B87; }
        .precio { text-align: right; font-family: Consolas, monospace; font-weight: bold; color: #203764; }

        .panel-acciones { display: flex; justify-content: flex-end; margin-top: 15px; }
        
        .btn-facturar {
            background: #284B87;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(40, 75, 135, 0.2);
        }
        .btn-facturar:hover { background: #203764; }

        /* Contenedor de mini tarjetas moviles oculto en PC */
        .mobile-cards-salidas { display: none; }


        /* 📱 =======================================================
            ⚡ REGLAS DE ADAPTACIÓN PARA CELULAR (MENOS DE 768px)
           ======================================================= */
        @media (max-width: 768px) {
            body { background: white; }

            header {
                background: #203764;
                height: 65px;
                padding: 0 15px;
            }

            .logo { height: 32px; }
            .separador { height: 26px; margin-left: 10px; margin-right: 10px; }
            .modulo { font-size: 20px; }
            header a { font-size: 14px; }

            main {
                margin: 0;
                padding: 15px;
                border-radius: 0;
                box-shadow: none;
                background: white;
            }

            h2 { font-size: 24px; margin-bottom: 15px; }
            #txtBuscar { padding: 14px 18px; font-size: 16px; margin-bottom: 15px; }

            .bus-header {
                position: relative;
            }

            .bus-detalle-panel { padding: 12px 5px; }

            /* Ocultar tabla nativa en moviles */
            .table-container { display: none; }

            /* Activar el listado vertical de mini tarjetas para las salidas */
            .mobile-cards-salidas {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 15px;
            }

            .salida-card {
                background: #f8fafc;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                padding: 10px;
                position: relative;
            }

            .salida-desc { font-size: 14px; font-weight: bold; color: #1e3a8a; margin-bottom: 2px; padding-right: 70px; }
            .salida-sub { font-size: 11px; color: #3b82f6; text-transform: uppercase; }
            .salida-precio { font-size: 15px; font-weight: bold; color: #203764; margin-top: 4px; }
            
            .salida-codigo-badge {
                position: absolute;
                top: 10px;
                right: 10px;
                background: #e2e8f0;
                color: #284B87;
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 11px;
                font-weight: bold;
                border: 1px solid #cbd5e1;
            }

            .salida-footer {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                font-weight: bold;
                color: #284B87;
                margin-top: 6px;
                border-top: 1px dashed #cbd5e1;
                padding-top: 4px;
            }

            .btn-facturar { width: 100%; text-align: center; padding: 12px; }
        }

        /* 📸 ESTILOS DEL ENCUADRE DE LA CÁMARA (OVERLAY LÍNEAS GUÍA) */
        .preview-camera-box {
            width: 120px; 
            aspect-ratio: 3 / 4; 
            background: #e2e8f0; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            overflow: hidden; 
            position: relative;
            border: 2px solid #284B87;
        }

        /* Esquineras decorativas estilo visor de cámara */
        .preview-camera-box::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 2px solid transparent;
            /* Crea los 4 esquineros blancos delimitadores de encuadre */
            border-image: linear-gradient(to bottom right, #ffffff 15%, transparent 16%, transparent 84%, #ffffff 85%) 1;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <img src="Logo/Imagotipo_ThermoAir.svg" alt="ThermoAir" class="logo">
            <div class="separador"></div>
            <div class="modulo">Gestión</div>
        </div>
        <a href="index_gestion.html">← Menú principal</a>
    </header>

    <main>
        <h2>Monitoreo de Buses</h2>

        <input type="text" id="txtBuscar" placeholder="Buscar por bus, placa o cliente...">

        <div class="lista-buses" id="contenedorBuses"></div>
    </main>

    <button id="btnAbrirFlotante" style="position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #284B87; color: white; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.35); z-index: 999; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">
        +
    </button>

    <div id="overlayFlotante" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; transition: opacity 0.3s ease;">
        
        <div id="hojaFlotante" style="position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 25px; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); z-index: 1011; transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94); max-width: 600px; margin: 0 auto; right: 0;">
            
            <div id="btnCerrarFlotante" style="width: 50px; height: 5px; background: #cbd5e1; border-radius: 3px; margin: 0 auto 20px auto; cursor: pointer;"></div>
            
            <h3 style="color: #203764; margin-bottom: 20px; font-size: 20px; font-weight: bold; text-align: center;">Registrar Nuevo Bus</h3>
            
            <form id="frmNuevoBus" style="display: flex; flex-direction: column; gap: 18px;">
                
                <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e1;">
                    <input type="file" id="regFoto" accept="image/*" capture="environment" style="display: none;">
                    
                    <div onclick="document.getElementById('regFoto').click()" class="preview-camera-box">
                        <img id="imgPreview" src="" style="display: none; width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1;">
                        <span id="iconCamara" style="font-size: 32px; position: relative; z-index: 2;">📸</span>
                    </div>
                    <span style="font-size: 13px; color: #284B87; font-weight: bold; cursor: pointer;" onclick="document.getElementById('regFoto').click()">Tomar o subir foto</span>
                </div>

                <div>
                    <label style="display: block; font-size: 13px; font-weight: bold; color: #203764; margin-bottom: 5px;">Nombre del Bus</label>
                    <input type="text" id="regBus" required placeholder="Ej. Bus 104 - Coomotor" style="width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 16px;">
                </div>

                <div>
                    <label style="display: block; font-size: 13px; font-weight: bold; color: #203764; margin-bottom: 5px;">Placa</label>
                    <input type="text" id="regPlaca" required placeholder="Ej. XPZ789" style="width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 16px; text-transform: uppercase;">
                </div>

                <button type="submit" id="btnGuardarBus" style="background: #203764; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 10px rgba(32, 55, 100, 0.2);">
                    Guardar e Ingresar
                </button>
            </form>
        </div>
    </div>

    <script src="buses.js"></script>

    <div id="visorImagenModal" onclick="this.style.display='none'" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;">
        <img id="imgVisorCompleto" src="" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    </div>

</body>

</html>
