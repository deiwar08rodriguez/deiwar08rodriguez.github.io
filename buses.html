<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Buses | ThermoAir</title>
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #203764;
            font-family: Calibri, "Segoe UI", Arial, sans-serif;
            color: #1f2937;
        }

        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            color: white;
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .logo {
            height: 42px;
            width: auto;
        }

        .separador {
            width: 2px;
            height: 38px;
            background: rgba(255, 255, 255, .35);
            margin-left: 18px;
            margin-right: 18px;
        }

        .modulo {
            color: white;
            font-size: 30px;
            font-style: italic;
            font-weight: normal;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        header a:hover {
            text-decoration: underline;
        }

        main {
            margin: 0 25px 25px 25px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
        }

        h2 {
            color: #203764;
            margin-bottom: 24px;
            font-size: 34px;
            font-weight: normal;
        }

        #txtBuscar {
            width: 100%;
            padding: 16px 22px;
            font-size: 17px;
            border: 2px solid #d2d9e6;
            border-radius: 10px;
            margin-bottom: 25px;
            outline: none;
            transition: .20s;
        }

        #txtBuscar:focus {
            border-color: #203764;
            box-shadow: 0 0 0 4px rgba(32, 55, 100, .15);
        }

        /* --- CONTENEDOR DE ACORDEONES (LISTADO DE BUSES) --- */
        .lista-buses {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bus-item {
            border: 1px solid #d7dde8;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: box-shadow 0.2s;
        }

        .bus-item:hover {
            box-shadow: 0 6px 15px rgba(32, 55, 100, 0.1);
        }

        /* Encabezado del Bus (Celda interactiva) */
        .bus-header {
            display: flex;
            align-items: center;
            padding: 18px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .bus-header:hover {
            background: #dfe9ff;
            transition: background 0.15s;
        }

        .bus-foto-wrapper {
            width: 80px;
            height: 80px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .bus-foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bus-foto-placeholder {
            color: #9ca3af;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .bus-info-main {
            flex-grow: 1;
        }

        .bus-titulo {
            font-size: 21px;
            color: #203764;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .bus-detalles-linea1, .bus-detalles-linea2 {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 2px;
        }

        .bus-detalles-linea2 {
            font-weight: bold;
            color: #284B87;
        }

        .bus-flecha {
            font-size: 18px;
            color: #284B87;
            margin-left: 15px;
            transition: transform 0.2s;
        }

        /* Rotación de la flecha al abrir */
        .bus-item.abierto .bus-flecha {
            transform: rotate(180deg);
        }

        /* --- PANEL DESPLEGABLE (DETALLE) --- */
        .bus-detalle-panel {
            display: none;
            padding: 20px;
            background: #fafbfc;
            border-top: 1px solid #e6ebf2;
        }

        .bus-item.abierto .bus-detalle-panel {
            display: block;
        }

        .table-container {
            border-radius: 8px;
            overflow: auto;
            border: 1px solid #d7dde8;
            max-height: 40vh;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            background: #284B87;
            color: white;
            padding: 12px;
            position: sticky;
            top: 0;
            text-align: left;
            z-index: 10;
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #e6ebf2;
        }

        tbody tr:nth-child(even) {
            background: #fafbfc;
        }

        .cantidad {
            text-align: center;
            font-weight: bold;
        }

        .precio {
            text-align: right;
            font-family: Consolas, monospace;
        }

        /* Fila de acción inferior */
        .panel-acciones {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-facturar {
            background: #284B87;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(40, 75, 135, 0.2);
        }

        .btn-facturar:hover {
            background: #203764;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <img src="Logo/imagotipo_blanco.svg" alt="ThermoAir" class="logo">
            <div class="separador"></div>
            <div class="modulo">Gestión</div>
        </div>
        <a href="index.html">← Menú principal</a>
    </header>

    <main>
        <h2>Monitoreo de Buses</h2>

        <input type="text" id="txtBuscar" placeholder="Buscar por bus, placa, técnicos o cliente...">

        <div class="lista-buses" id="contenedorBuses">
            <!-- Las tarjetas de los buses se inyectarán de forma dinámica aquí -->
        </div>
    </main>

    <script src="buses.js"></script>
</body>

</html>
