<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio Técnico (Buses) | ThermoAir</title>
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- 🖥️ DISEÑO BASE PARA COMPUTADORA --- */
        body {
            background: #203764;
            font-family: Calibri, "Segoe UI", Arial, sans-serif;
            color: #1f2937;
        }

        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            color: white;
        }

        .logo-area { display: flex; align-items: center; }
        .logo { height: 42px; width: auto; }
        .separador { width: 2px; height: 38px; background: rgba(255, 255, 255, .35); margin-left: 18px; margin-right: 18px; }
        .modulo { color: white; font-size: 26px; font-style: italic; font-weight: normal; }
        header a { color: white; text-decoration: none; font-size: 18px; }
        header a:hover { text-decoration: underline; }

        main {
            margin: 0 25px 25px 25px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
        }

        h2 { color: #203764; margin-bottom: 5px; font-size: 34px; font-weight: normal; }
        .bajada-titulo { color: #64748b; font-size: 15px; margin-bottom: 24px; }

        #txtBuscar {
            width: 100%;
            padding: 16px 22px;
            font-size: 17px;
            border: 2px solid #d2d9e6;
            border-radius: 10px;
            margin-bottom: 25px;
            outline: none;
            transition: .20s;
        }

        #txtBuscar:focus {
            border-color: #203764;
            box-shadow: 0 0 0 4px rgba(32, 55, 100, .15);
        }

        .lista-buses {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bus-item {
            border: 1px solid #d7dde8;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: box-shadow 0.2s;
        }

        .bus-item:hover {
            box-shadow: 0 6px 15px rgba(32, 55, 100, 0.1);
        }

        .bus-header {
            display: flex;
            align-items: stretch;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .bus-header:hover {
            background: #dfe9ff;
            transition: background 0.15s;
        }

        .bus-foto-wrapper {
            width: 110px;
            min-height: 110px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            border-right: 1px solid #d7dde8;
        }

        .bus-foto { width: 100%; height: 100%; object-fit: cover; }
        .bus-foto-placeholder { color: #284B87; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        .bus-info-main { 
            flex-grow: 1; 
            padding: 15px 45px 15px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bus-titulo { font-size: 19px; color: #1e3a8a; font-weight: bold; margin-bottom: 2px; }
        .bus-detalles-linea1 { font-size: 13px; color: #3b82f6; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        .bus-detalles-linea2 { font-size: 13px; font-weight: bold; color: #203764; }

        .bus-flecha { 
            font-size: 16px; 
            color: #284B87; 
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            transition: transform 0.2s; 
        }
        .bus-item.abierto .bus-flecha { transform: translateY(-50%) rotate(180deg); }


        .bus-detalle-panel {
            display: none;
            padding: 20px;
            background: #fafbfc;
            border-top: 1px solid #e6ebf2;
        }

        .bus-item.abierto .bus-detalle-panel { display: block; }

        /* Estilos de Tabla en PC con Hora, Repuesto/Servicio y Recibe */
        .table-container {
            border-radius: 8px;
            overflow: auto;
            border: 1px solid #d7dde8;
            max-height: 40vh;
            background: white;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th { background: #284B87; color: white; padding: 12px; position: sticky; top: 0; text-align: left; z-index: 10; font-size: 13px; letter-spacing: .5px;}
        tbody td { padding: 10px 12px; border-bottom: 1px solid #e6ebf2; color: #203764; }
        tbody tr:nth-child(even) { background: #fafbfc; }
        tbody tr:hover { background: #dfe9ff; transition: .15s; }

        .col-fecha { width: 12%; }
        .col-hora { width: 10%; }
        .col-descripcion { font-weight: bold; color: #1e3a8a; }
        .col-recibe { color: #3b82f6; font-weight: bold; width: 18%; }
        .cantidad { text-align: center; font-weight: bold; color: #284B87; width: 10%; }

        .panel-acciones { display: flex; justify-content: flex-end; margin-top: 15px; }
        
        .btn-facturar {
            background: #284B87;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(40, 75, 135, 0.2);
        }
        .btn-facturar:hover { background: #203764; }

        /* Contenedor de mini tarjetas moviles oculto en PC */
        .mobile-cards-salidas { display: none; }


        /* 📱 =======================================================
            ⚡ REGLAS DE ADAPTACIÓN PARA CELULAR (MENOS DE 768px)
           ======================================================= */
        @media (max-width: 768px) {
            body { background: white; }

            header {
                background: #203764;
                height: 65px;
                padding: 0 15px;
            }

            .logo { height: 32px; }
            .separador { height: 26px; margin-left: 10px; margin-right: 10px; }
            .modulo { font-size: 18px; }
            header a { font-size: 14px; }

            main {
                margin: 0;
                padding: 15px;
                border-radius: 0;
                box-shadow: none;
                background: white;
            }

            h2 { font-size: 24px; margin-bottom: 2px; }
            .bajada-titulo { font-size: 13px; margin-bottom: 15px; }
            #txtBuscar { padding: 14px 18px; font-size: 16px; margin-bottom: 15px; }

            .bus-detalle-panel { padding: 12px 5px; }

            /* Ocultar tabla nativa en moviles */
            .table-container { display: none; }

            /* Activar el listado vertical de mini tarjetas para las salidas */
            .mobile-cards-salidas {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 15px;
            }

            .salida-card {
                background: #f8fafc;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                padding: 10px;
                position: relative;
            }

            .salida-desc { font-size: 14px; font-weight: bold; color: #1e3a8a; margin-bottom: 2px; padding-right: 20px; }
            .salida-sub { font-size: 11px; color: #3b82f6; text-transform: uppercase; font-weight: bold; }
            
            .salida-footer {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                font-weight: bold;
                color: #284B87;
                margin-top: 6px;
                border-top: 1px dashed #cbd5e1;
                padding-top: 4px;
            }

            .btn-facturar { width: 100%; text-align: center; padding: 12px; }
        }
    </style>
</head>
